<header class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <!--
      routerLink:
      Deze link navigeert naar de route '/' zonder de volledige pagina te herladen.
    -->
    <a class="navbar-brand fw-bold" routerLink="/">{{ appTitle }}</a>

    <nav class="navbar-nav flex-row flex-wrap gap-2 ms-lg-auto" aria-label="Hoofdnavigatie">
      <!--
        routerLink navigeert binnen Angular zonder volledige page refresh.
        [class.active] geeft de actieve link Bootstrap-styling.
      -->
      <a class="nav-link rounded px-3" routerLink="/databinding" [class.active]="isActiveRoute('/databinding')">
        Databinding
      </a>
      <a class="nav-link rounded px-3" routerLink="/students" [class.active]="isActiveRoute('/students')">
        Studenten
      </a>
      <a class="nav-link rounded px-3" routerLink="/input-output" [class.active]="isActiveRoute('/input-output')">
        Input & Output
      </a>
      <a class="nav-link rounded px-3" routerLink="/reactive-form" [class.active]="isActiveRoute('/reactive-form')">
        Reactive Form
      </a>
      <a class="nav-link rounded px-3" routerLink="/drag-drop" [class.active]="isActiveRoute('/drag-drop')">
        Drag & Drop
      </a>
      <a class="nav-link rounded px-3" routerLink="/summary" [class.active]="isActiveRoute('/summary')">
        Samenvatting
      </a>
    </nav>
  </div>
</header>

<div class="container py-4">
  <main>
    <!--
      RouterOutlet:
      Hier plaatst Angular de pagina die bij de URL past.
      '/' toont Home, '/databinding' toont Databinding, enzovoort.
    -->
    <router-outlet />
  </main>

  <footer class="border-top mt-5 pt-3 text-secondary small">
    Front-End Development examenvoorbereiding - 2026
  </footer>
</div>
