<div class="container py-4">
  <header class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-4 border-bottom pb-3 mb-4">
    <div>
      <p class="text-uppercase fw-bold text-secondary small mb-2">Angular oefeningen</p>
      <h1 class="h2 mb-0">{{ appTitle }}</h1>
    </div>

    <nav class="d-grid gap-2 app-topic-nav" aria-label="Onderdelen">
      <!--
        @for:
        We tonen automatisch een link voor elk item in topics.
        Dit is de nieuwe Angular-syntax, dus we gebruiken niet *ngFor.
      -->
      @for (topic of topics; track topic.route) {
        <a
          class="border rounded p-3 text-decoration-none text-dark"
          [routerLink]="topic.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="d-block fw-bold">{{ topic.label }}</span>
          <small class="text-secondary">{{ topic.description }}</small>
        </a>
      }
    </nav>
  </header>

  <main>
    <!--
      RouterOutlet:
      Hier plaatst Angular de pagina die bij de URL past.
      /databinding toont dus de Databinding pagina.
    -->
    <router-outlet />
  </main>
</div>
