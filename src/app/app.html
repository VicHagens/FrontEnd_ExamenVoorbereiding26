<mat-toolbar color="primary" class="app-toolbar">
  <div class="container d-flex flex-wrap align-items-center gap-2">
    <!--
      mat-toolbar:
      Dit is een Angular Material toolbar.
      routerLink:
      Deze link navigeert naar de route '/' zonder de volledige pagina te herladen.
    -->
    <a mat-button class="app-title" routerLink="/">{{ appTitle }}</a>

    <span class="toolbar-spacer"></span>

    <nav class="d-flex flex-wrap gap-2" aria-label="Hoofdnavigatie">
      <!--
        mat-button:
        Deze links krijgen Material button styling.
        routerLink navigeert binnen Angular zonder volledige page refresh.
        [class.active] geeft de actieve link extra styling.
      -->
      <a mat-button routerLink="/databinding" [class.active]="isActiveRoute('/databinding')">
        Databinding
      </a>
      <a mat-button routerLink="/students" [class.active]="isActiveRoute('/students')">
        Studenten
      </a>
      <a mat-button routerLink="/input-output" [class.active]="isActiveRoute('/input-output')">
        Input & Output
      </a>
      <a mat-button routerLink="/reactive-form" [class.active]="isActiveRoute('/reactive-form')">
        Reactive Form
      </a>
      <a mat-button routerLink="/drag-drop" [class.active]="isActiveRoute('/drag-drop')">
        Drag & Drop
      </a>
      <a mat-button routerLink="/summary" [class.active]="isActiveRoute('/summary')">
        Samenvatting
      </a>
    </nav>
  </div>
</mat-toolbar>

<div class="container py-4">
  <main>
    <!--
      RouterOutlet:
      Hier plaatst Angular de pagina die bij de URL past.
      '/' toont Home, '/databinding' toont Databinding, enzovoort.
    -->
    <router-outlet />
  </main>

  <footer class="border-top mt-5 pt-3 text-secondary small">
    Front-End Development examenvoorbereiding - 2026 -- Dit project kan stukken leerstof missen of fout uitleggen. Wees hiervan op de hoogte!!
  </footer>
</div>
